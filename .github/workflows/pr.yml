name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────────────────────
# 1. RUFF — lint + format check
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "Ruff · Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.8.0

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

# ──────────────────────────────────────────────────────────────────────────────
# 2. MIGRATION CHECK — apply all migrations to a fresh DB
# ──────────────────────────────────────────────────────────────────────────────
  migration-check:
    name: "Alembic · Migration Check"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: codepulse
          POSTGRES_USER: codepulse
          POSTGRES_PASSWORD: codepulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codepulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply all migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://codepulse:codepulse@localhost:5432/codepulse
        run: alembic upgrade head

      - name: Verify DB is at head revision
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://codepulse:codepulse@localhost:5432/codepulse
        run: alembic check

# ──────────────────────────────────────────────────────────────────────────────
# 3. FRONTEND BUILD — type-check + Next.js production build
# ──────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: "Frontend · Build Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_GITHUB_CLIENT_ID: ci_placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

# ──────────────────────────────────────────────────────────────────────────────
# 4. DOCKER COMPOSE — full stack smoke test
# ──────────────────────────────────────────────────────────────────────────────
  docker-compose-test:
    name: "Docker Compose · Stack Smoke Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          SECRET_KEY=ci-test-secret-key-not-for-production
          GITHUB_CLIENT_ID=ci_placeholder
          GITHUB_CLIENT_SECRET=ci_placeholder
          GITHUB_REDIRECT_URI=http://localhost:3000/auth/callback
          FRONTEND_URL=http://localhost:3000
          NEXT_PUBLIC_GITHUB_CLIENT_ID=ci_placeholder
          NEXT_PUBLIC_API_URL=http://localhost:8000
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          ALGORITHM=HS256
          GITHUB_API_URL=https://api.github.com
          GITHUB_GRAPHQL_URL=https://api.github.com/graphql
          EOF

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend ready after $((i * 5))s"
              exit 0
            fi
            echo "  attempt $i / 40 — sleeping 5s"
            sleep 5
          done
          echo "Backend never became healthy"
          docker compose logs backend
          exit 1

      - name: Assert health endpoint
        run: |
          response=$(curl -sf http://localhost:8000/health)
          echo "Response: $response"
          echo "$response" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'Unexpected: {d}'
          print('Health check passed')
          "

      - name: Assert OpenAPI docs are reachable
        run: curl -sf http://localhost:8000/docs -o /dev/null

      - name: Assert unauthenticated API returns 401
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/orgs)
          [ "$status" = "401" ] || (echo "Expected 401, got $status" && exit 1)
          echo "Auth guard OK (401)"

      - name: Tear down
        if: always()
        run: docker compose down -v

# ──────────────────────────────────────────────────────────────────────────────
# 5. REGRESSION TESTS — pytest suite against a live backend
# ──────────────────────────────────────────────────────────────────────────────
  regression:
    name: "Regression · API Tests"
    runs-on: ubuntu-latest
    needs: [migration-check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: codepulse
          POSTGRES_USER: codepulse
          POSTGRES_PASSWORD: codepulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codepulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://codepulse:codepulse@localhost:5432/codepulse
      SECRET_KEY: ci-test-secret-key
      GITHUB_CLIENT_ID: ci_placeholder
      GITHUB_CLIENT_SECRET: ci_placeholder
      GITHUB_REDIRECT_URI: http://localhost:3000/auth/callback
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend + test dependencies
        run: pip install -r backend/requirements.txt pytest httpx

      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend in background
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/uvicorn.pid
          echo "Waiting for startup..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done

      - name: Run regression tests
        working-directory: backend
        env:
          TEST_API_URL: http://localhost:8000
        run: pytest tests/ -v --tb=short

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
